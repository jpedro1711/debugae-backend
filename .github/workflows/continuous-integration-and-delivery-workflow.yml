name: A workflow to test the composite action
on: [workflow_dispatch]
jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    name: A job to say hello
    steps:
      - uses: actions/checkout@v6

      - id: test_composite_action
        uses: jpedro1711/composite-cache-deps@v1
        with:
          who-to-greet: 'TEST 2'
